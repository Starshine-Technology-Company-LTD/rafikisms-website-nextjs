services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: rafikisms-landing:latest
    container_name: rafikisms-landing
    ports:
      - "${PORT:-40401}:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
