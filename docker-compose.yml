
name: rafikisms-landing

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: rafikisms-landing:latest
    container_name: rafikisms-landing
    ports:
      - "127.0.0.1:${PORT:-40401}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://rafikisms.com
      - NEXT_PUBLIC_VENDOR_SIGNIN_URL=https://vendor.rafikisms.com/auth/login
      - NEXT_PUBLIC_VENDOR_REGISTER_URL=https://vendor.rafikisms.com/auth/register
      - NEXT_PUBLIC_API_URL=https://api.rafikisms.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
